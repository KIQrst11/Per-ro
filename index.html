<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Загрузка приложения</title>

<script>
window.onload = function() {
    setTimeout(() => {
        window.location.href = "https://github.com/KIQrst11/Persex-app/releases/download/v1.0/PerSex.Online.apk";
    }, 1500);
};

function openImg(src) {
    const w = window.open("");
    w.document.write('<img src="'+src+'" style="width:100%;">');
}
</script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
    overflow:hidden;
}

.bg{
    position:absolute;
    width:100%;
    height:100%;
    backdrop-filter:blur(10px);
}

.card{
    position:relative;
    z-index:2;
    text-align:center;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:24px;
    padding:40px;
    width:90%;
    max-width:420px;
    color:white;
    backdrop-filter:blur(20px);
}

.logo{
    width:100px;
    height:100px;
    border-radius:24px;
    margin:auto;
    margin-bottom:20px;
    object-fit:cover;
    box-shadow:0 0 25px rgba(255,255,255,.3);
}

h1{
    font-size:28px;
    margin-bottom:10px;
}

p{
    opacity:.8;
    margin-bottom:25px;
}

.loader{
    width:48px;
    height:48px;
    border:4px solid rgba(255,255,255,.3);
    border-top:4px solid white;
    border-radius:50%;
    margin:auto;
    animation:spin 1s linear infinite;
}

.download{
    display:inline-block;
    margin-top:25px;
    color:white;
    text-decoration:none;
    background:#2563eb;
    padding:12px 24px;
    border-radius:12px;
    transition:.3s;
}

.download:hover{
    background:#1d4ed8;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}
    
.gallery-title {
    margin-top: 25px;
    font-size: 14px;
    opacity: 0.7;
}

.gallery {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 12px;
    flex-wrap: wrap;
}

.gallery img {
    width: 180px;
    height: 320px;
    object-fit: cover;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 15px 30px rgba(0,0,0,0.35);
    cursor: pointer;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

    <img src="logo.png" class="logo">

    <h1>PerSex</h1>

    <p>
        Подготавливаем загрузку...
    </p>

    <div class="loader"></div>

    <a class="download"
       href="https://github.com/KIQrst11/Persex-app/releases/download/v1.0/PerSex.Online.apk">
       Скачать вручную
    </a>
<div class="gallery-title">Скриншоты приложения</div>

<div class="gallery">
    <img src="assets/img1.png" onclick="openImg(this.src)">
    <img src="assets/img2.png" onclick="openImg(this.src)">
    <img src="assets/img3.png" onclick="openImg(this.src)">
</div>

</body>
</html>
